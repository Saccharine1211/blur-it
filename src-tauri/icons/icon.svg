<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="fade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05)"/>
    </linearGradient>
    <clipPath id="roundClip">
      <rect x="16" y="16" width="480" height="480" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Mosaic grid (bottom-left area - represents pixelated/blurred content) -->
  <g clip-path="url(#roundClip)" opacity="0.3">
    <!-- Row 1 -->
    <rect x="16" y="336" width="60" height="60" fill="#c4b5fd"/>
    <rect x="76" y="336" width="60" height="60" fill="#a78bfa"/>
    <rect x="136" y="336" width="60" height="60" fill="#ddd6fe"/>
    <rect x="196" y="336" width="60" height="60" fill="#c4b5fd"/>
    <rect x="256" y="336" width="60" height="60" fill="#a78bfa"/>
    <!-- Row 2 -->
    <rect x="16" y="396" width="60" height="60" fill="#a78bfa"/>
    <rect x="76" y="396" width="60" height="60" fill="#ddd6fe"/>
    <rect x="136" y="396" width="60" height="60" fill="#c4b5fd"/>
    <rect x="196" y="396" width="60" height="60" fill="#a78bfa"/>
    <rect x="256" y="396" width="60" height="60" fill="#ddd6fe"/>
    <!-- Row 3 -->
    <rect x="16" y="456" width="60" height="60" fill="#ddd6fe"/>
    <rect x="76" y="456" width="60" height="60" fill="#c4b5fd"/>
    <rect x="136" y="456" width="60" height="60" fill="#a78bfa"/>
    <rect x="196" y="456" width="60" height="60" fill="#ddd6fe"/>
    <rect x="256" y="456" width="60" height="60" fill="#c4b5fd"/>
    <!-- Smaller grid (transition zone) -->
    <rect x="316" y="336" width="40" height="40" fill="#c4b5fd" opacity="0.6"/>
    <rect x="356" y="336" width="40" height="40" fill="#ddd6fe" opacity="0.4"/>
    <rect x="316" y="376" width="40" height="40" fill="#ddd6fe" opacity="0.4"/>
    <rect x="356" y="376" width="40" height="40" fill="#c4b5fd" opacity="0.2"/>
    <rect x="16" y="276" width="40" height="40" fill="#c4b5fd" opacity="0.5"/>
    <rect x="56" y="276" width="40" height="40" fill="#ddd6fe" opacity="0.4"/>
    <rect x="96" y="276" width="40" height="40" fill="#a78bfa" opacity="0.3"/>
    <rect x="16" y="316" width="40" height="40" fill="#ddd6fe" opacity="0.3"/>
    <rect x="56" y="316" width="40" height="40" fill="#a78bfa" opacity="0.2"/>
  </g>

  <!-- Main "B" letter -->
  <g transform="translate(256, 256)">
    <text x="0" y="0" text-anchor="middle" dominant-baseline="central"
          font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
          font-weight="800" font-size="280" fill="white"
          letter-spacing="-10">B</text>
  </g>

  <!-- Subtle glass overlay -->
  <rect x="16" y="16" width="480" height="240" rx="96" ry="96" fill="url(#fade)" clip-path="url(#roundClip)"/>
</svg>
